<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in — HireOrGetHired</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <a href="index.html" class="back">← Back to home</a>
      <h1>Log in</h1>
      <p class="sub">Choose your role. Demo credentials are pre-filled — just click Log in.</p>

      <form id="login-form" action="#" method="get">
        <div class="login-role">
          <input type="radio" name="role" id="role-seeker" value="jobseeker" checked>
          <label for="role-seeker">Job Seeker</label>
          <input type="radio" name="role" id="role-recruiter" value="recruiter">
          <label for="role-recruiter">Recruiter</label>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" value="demo@hireorgethired.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" value="demo1234" required>
        </div>

        <button type="submit">Log in</button>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var role = document.querySelector('input[name="role"]:checked').value;
      if (role === 'recruiter') {
        window.location.href = 'recruiter.html';
      } else {
        window.location.href = 'jobseeker.html';
      }
    });
  </script>
</body>
</html>
